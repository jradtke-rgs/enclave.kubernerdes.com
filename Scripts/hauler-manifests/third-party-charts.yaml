---
# Third-party Helm charts
# These are community/vendor charts pulled from their public repos.
# `add-images: true` causes hauler to also pull all container images
# referenced by the chart, so no separate image manifest is needed for these.
#
# Update versions here when upgrading components.
apiVersion: content.hauler.cattle.io/v1
kind: Charts
metadata:
  name: third-party-charts
spec:
  charts:
    # cert-manager — required by Rancher Manager
    - name: cert-manager
      repoURL: https://charts.jetstack.io
      version: v1.18.0
      add-images: true
      add-dependencies: true

    # Rancher Manager — Helm chart from public stable repo
    # Images are hauled separately via `hauler store sync --products rancher=v2.13.3`
    # NOTE: Rancher 2.13.x supports Kubernetes <= 1.34.x — pin RKE2 accordingly.
    - name: rancher
      repoURL: https://releases.rancher.com/server-charts/stable
      version: 2.13.3
      add-images: false

    # Longhorn — distributed block storage (optional, included for app clusters)
    - name: longhorn
      repoURL: https://charts.longhorn.io
      version: 1.7.2
      add-images: true
      add-dependencies: true
