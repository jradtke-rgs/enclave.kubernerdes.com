---
# Third-party container images NOT pulled via chart dependencies above.
# Add entries here for any image that is referenced directly
# (e.g., in a Kubernetes manifest rather than a Helm chart).
apiVersion: content.hauler.cattle.io/v1
kind: Images
metadata:
  name: third-party-images
  annotations:
    hauler.dev/platform: linux/amd64
spec:
  images: []
  # Add entries as needed, e.g.:
  #   - name: docker.io/library/busybox:latest
  #   - name: ghcr.io/some-org/some-image:v1.2.3
