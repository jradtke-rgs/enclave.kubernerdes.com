---
# Files — binaries, install scripts, and other artifacts served via hauler fileserver.
# These are fetched from their public URLs and stored in the hauler store.
# Served on the admin node via: hauler store serve fileserver (default port 8080)
#
# Nodes in the enclave install binaries from the fileserver rather than the internet.
apiVersion: content.hauler.cattle.io/v1
kind: Files
metadata:
  name: install-scripts
spec:
  files:
    # RKE2 install script
    - path: https://get.rke2.io
      name: install-rke2.sh

    # Hauler install script (for bootstrapping a new admin node)
    - path: https://get.hauler.dev
      name: install-hauler.sh

    # cosign binary (supply chain verification)
    # Update URL when upgrading cosign version
    - path: https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
      name: cosign-linux-amd64

    # Carbide public key (image signature verification)
    - path: https://raw.githubusercontent.com/rancherfederal/carbide-releases/main/carbide-key.pub
      name: carbide-key.pub

    # Harbor offline installer (used by 02_install_harbor.sh)
    # Update version here when upgrading Harbor
    - path: https://github.com/goharbor/harbor/releases/download/v2.12.2/harbor-offline-installer-v2.12.2.tgz
      name: harbor-offline-installer-v2.12.2.tgz
